version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: quizai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: quizdb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/quizdb
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_change_me}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://your-n8n-instance.com/webhook/quiz}
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
